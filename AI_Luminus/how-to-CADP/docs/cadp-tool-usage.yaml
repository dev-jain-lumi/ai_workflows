cadp_tool_usage:
  source_reference:
    title: Intro to CADP - Part 1
    url: https://teams.microsoft.com/l/meeting/details?eventId=AAMkAGQ2YzllMWNhLTliZDktNDFlNC04YTQ1LTI2OTM5N2ViMGE2NQBGAAAAAABXebg2codBS6Pn3OksLyBDBwAmEmpLYXqPRadO6miqO_MeAAAAAAENAAAmEmpLYXqPRadO6miqO_MeAADLNCuMAAA%3d
    evidence_note: >
      The available transcript confirms that the first session focused on positioning tools
      and making sure the setup works before deeper coding. Detailed command examples below are
      practical working guidance and should be validated against the actual platform standards.

  mental_model:
    summary: >
      ONA is where developers write and run code. GitLab is where code lives permanently.
      DBT transforms data. Snowflake stores and executes data. Conveyor runs production pipelines.
      Data Product Manager and the Portal govern access and discovery.
    rule_of_thumb:
      - ONA is the workbench.
      - GitLab is the source of truth.
      - DBT is the modelling engine.
      - Snowflake is the data engine.
      - Conveyor is the orchestrator.
      - Data Product Manager is the governance manager.
      - Data Product Portal is the consumer front door.

  local_development_flow:
    - step: 1
      name: Open workspace
      tool: ONA
      action: Open the GitLab repository in the cloud development environment.
      output: Editable CADP project.

    - step: 2
      name: Create branch
      tool: GitLab / ONA terminal
      example_commands:
        - git checkout -b feature/build-contract-fact
      output: Isolated development branch.

    - step: 3
      name: Build model
      tool: ONA + DBT
      example_path: models/marts/facts/fact_contract_daily.sql
      output: SQL model file.

    - step: 4
      name: Run DBT model
      tool: DBT
      example_commands:
        - dbt run --select fact_contract_daily
      what_happens:
        - DBT resolves model dependencies.
        - DBT compiles SQL.
        - DBT connects to Snowflake.
        - Snowflake creates or updates the target DEV/private object.
      output: Model materialized in Snowflake development target.

    - step: 5
      name: Run tests
      tool: DBT
      example_commands:
        - dbt test --select fact_contract_daily
      output: Data quality test results.

    - step: 6
      name: Inspect output
      tool: Snowflake
      example_sql: |
        select *
        from <dev_schema>.fact_contract_daily
        limit 100;
      output: Developer validates rows, grain, joins, and measures.

    - step: 7
      name: Commit and push
      tool: GitLab
      example_commands:
        - git status
        - git add .
        - git commit -m "Build contract daily fact model"
        - git push
      output: Code persisted and pipeline can be triggered.

  dbt_commands:
    common:
      run_model:
        command: dbt run --select <model_name>
        use_when: Build one model and its direct logic.
      run_model_and_children:
        command: dbt run --select <model_name>+
        use_when: Build model plus downstream dependencies.
      run_tests:
        command: dbt test --select <model_name>
        use_when: Validate model contract.
      preview:
        command: dbt show --select <model_name>
        use_when: Quickly preview model result without relying on full publish flow.
      compile:
        command: dbt compile
        use_when: Check generated SQL before execution.
      build:
        command: dbt build --select <model_name>
        use_when: Run models and tests together if supported by project setup.

  where_outputs_appear:
    local_dbt_run:
      trigger: ONA terminal
      likely_location: Snowflake DEV/private schema
      visibility: CADP developers
      consumer_ready: false
      note: Local runs validate development logic but do not automatically publish official CADP outputs.

    ci_cd_deployment:
      trigger: GitLab commit/merge/pipeline
      likely_location: Conveyor-managed target
      visibility: Platform/CADP team
      consumer_ready: partially
      note: Deployment prepares controlled execution.

    published_cadp:
      trigger: Conveyor publish workflow + product registration
      likely_location: Published Snowflake CADP schema
      visibility: Approved consumers
      consumer_ready: true
      note: This is the governed output consumers should rely on.

  validation_in_snowflake:
    row_sample:
      sql: |
        select *
        from <schema>.<table>
        limit 100;
    row_count:
      sql: |
        select count(*) as row_count
        from <schema>.<table>;
    duplicate_grain_check:
      sql: |
        select contract_key, date_key, count(*) as row_count
        from <schema>.fact_contract_daily
        group by contract_key, date_key
        having count(*) > 1;
    null_key_check:
      sql: |
        select count(*) as null_key_rows
        from <schema>.fact_contract_daily
        where contract_key is null
           or date_key is null;
    reconciliation_check:
      sql: |
        select date_key, sum(daily_revenue) as revenue
        from <schema>.fact_contract_daily
        group by date_key
        order by date_key;

  tool_boundaries:
    ONA:
      can_do:
        - Edit code.
        - Run DBT commands.
        - Connect to Snowflake.
        - Commit to GitLab.
      cannot_do:
        - Replace GitLab as permanent source control.
        - Replace Snowflake as data browser.
        - Replace Conveyor as production orchestrator.

    GitLab:
      can_do:
        - Store code.
        - Review changes.
        - Trigger CI/CD.
      cannot_do:
        - Store final analytics data.
        - Approve SADP access by itself.

    DBT:
      can_do:
        - Transform data.
        - Compile SQL.
        - Run tests.
        - Materialize models in Snowflake.
      cannot_do:
        - Govern product access.
        - Replace business validation.
        - Own source-system semantics.

    Conveyor:
      can_do:
        - Schedule and run pipelines.
        - Execute productionized DBT workflows.
        - Operationalize refresh.
      cannot_do:
        - Decide business definitions.
        - Fix poor CADP modelling.

    Snowflake:
      can_do:
        - Store SADP and CADP data.
        - Execute SQL.
        - Enforce technical access.
      cannot_do:
        - Explain business meaning without metadata.
        - Replace Data Product Portal discovery.

    Data_Product_Manager:
      can_do:
        - Manage agreements.
        - Register products.
        - Support metadata lifecycle.
      cannot_do:
        - Write DBT model logic.

    Data_Product_Portal:
      can_do:
        - Expose product metadata.
        - Allow consumers to discover products.
        - Support access requests.
      cannot_do:
        - Run transformations.
        - Store development code.

  common_confusions:
    - confusion: I ran DBT in ONA but consumers cannot see the table.
      correction: Local DBT runs usually write to DEV/private targets. Publishing requires deployment and product registration.
    - confusion: Snowflake table exists, so the CADP is done.
      correction: A CADP also needs tests, metadata, ownership, agreements, and discoverability.
    - confusion: SADP access means I can publish anything.
      correction: SADP access only authorizes input usage. CADP output still needs contract, validation, and governance.
    - confusion: Qlik/report developers can fix the model.
      correction: CADP should provide a clean product so consumers do not rebuild source logic downstream.

  one_line_summary: >
    Use ONA to build, GitLab to persist, DBT to transform, Snowflake to validate, Conveyor to run,
    and the data product governance layer to approve and publish.
