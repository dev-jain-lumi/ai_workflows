cadp_tools:
  source_reference:
    title: Intro to CADP - Part 1
    evidence_note: >
      The available transcript is incomplete. It confirms the high-level concept of data products,
      SADP ownership, and that the session mainly positioned tools. Detailed tool behavior below is
      enriched from the existing files and should be validated in the next hands-on CADP session.

  data_product_taxonomy:
    confirmed_from_transcript:
      - name: SADP
        full_name: Source-Aligned Data Product
        purpose: Ingest and expose raw or near-raw data from source systems.
        examples:
          - Salesforce
          - SAP
          - Other operational source systems
        typical_owner: DNA use case team / source-data-owning team
        consumer_orientation: low
        modelling_level: source-oriented
      - name: ADP
        full_name: Aggregate Data Product
        purpose: Combine or aggregate data across multiple source-aligned products.
        typical_owner: platform/data product team or domain team
        consumer_orientation: medium
        modelling_level: integration-oriented
      - name: CADP
        full_name: Consumer-Aligned Data Product
        purpose: Provide stable, business-friendly, consumer-ready datasets.
        typical_owner: consuming domain/use-case team
        consumer_orientation: high
        modelling_level: analytics/product-oriented

  big_picture:
    summary: >
      A CADP is created inside a governed purpose. The purpose controls ownership, access,
      repository setup, orchestration setup, Snowflake access, and publication. Developers build
      the CADP logic using the approved source data products, then deploy through controlled CI/CD
      and orchestration so that consumers get stable, discoverable data products.
    core_principle: A CADP should hide source-system complexity and expose a stable consumer contract.
    governance_unit: Purpose
    technical_backbone:
      - GitLab
      - ONA
      - DBT
      - Vulkan
      - Conveyor
      - Snowflake
    governance_and_publication:
      - Purpose Request System
      - Architects / governance reviewers
      - Data Product Manager
      - Data Product Portal
      - SADP owners

  tool_definitions:
    Purpose_Request_System:
      purpose: Create the governed container for the CADP initiative.
      used_for:
        - Registering purpose name, description, owner, contributors, and required tools.
        - Triggering governance review.
        - Starting technical provisioning.
      owned_by: Requesting Product Owner / Purpose Owner
      output:
        - Approved purpose
        - Provisioning request

    Architects:
      purpose: Validate governance, naming, architecture fit, and platform alignment.
      used_for:
        - Reviewing the purpose request.
        - Checking whether the proposed CADP fits platform rules.
        - Approving or challenging provisioning scope.
      owned_by: Architecture / platform governance
      output:
        - Approved or corrected purpose design

    Platform_Automation:
      purpose: Provision the technical foundation after purpose approval.
      used_for:
        - Creating GitLab repository.
        - Creating Conveyor project.
        - Provisioning Snowflake roles, schemas, and access bindings.
      owned_by: Platform team
      output:
        - Ready technical workspace

    GitLab:
      purpose: Source control and CI/CD entry point.
      used_for:
        - Storing CADP code.
        - Managing branches, commits, merge requests, and reviews.
        - Triggering CI/CD deployment.
      owned_by: CADP development team
      output:
        - Version-controlled CADP code
        - CI/CD pipeline runs

    ONA:
      purpose: Cloud-based development workspace.
      used_for:
        - Opening the GitLab repository.
        - Writing DBT SQL models.
        - Running local development commands.
        - Testing and iterating before committing.
      owned_by: Individual CADP developer
      important_constraints:
        - ONA is a development environment, not the persistent source of truth.
        - Code must be committed and pushed to GitLab frequently.
        - Do not rely on ONA workspace state as permanent storage.
      output:
        - Local code changes
        - DBT run/test results
        - Git commits

    CADP_Template:
      purpose: Bootstrap a standard CADP repository structure.
      used_for:
        - Creating DBT project structure.
        - Creating expected folders and baseline configuration.
        - Adding standard CI/CD and orchestration configuration.
      owned_by: Platform / CADP standards team
      output:
        - Standardized starting codebase

    DBT:
      purpose: Transformation framework for SQL-based data modelling.
      used_for:
        - Creating staging, intermediate, dimension, and fact models.
        - Defining dependencies between models.
        - Running data quality tests.
        - Building tables/views in Snowflake.
      owned_by: CADP development team
      output:
        - Transformed Snowflake objects
        - Test results
        - Compiled SQL

    Vulkan:
      purpose: Pipeline and publish configuration layer.
      used_for:
        - Defining how CADP workloads are packaged and executed.
        - Configuring pipeline behavior, schedules, dependencies, or publish steps.
      owned_by: CADP development team with platform standards
      confidence_note: Present in existing files but not confirmed in the available transcript excerpt.
      output:
        - Executable orchestration configuration

    Conveyor:
      purpose: Orchestration engine, likely Airflow-based.
      used_for:
        - Running productionized CADP pipelines.
        - Scheduling refreshes.
        - Executing DBT jobs against Snowflake.
        - Managing operational runs.
      owned_by: Platform orchestration team / CADP team depending on setup
      output:
        - Executed CADP pipeline
        - Refreshed CADP tables

    Snowflake:
      purpose: Data storage, compute, and serving layer.
      used_for:
        - Hosting SADP input data.
        - Running DBT transformations.
        - Storing DEV/ACC/PROD CADP outputs.
        - Serving approved consumer datasets.
      owned_by: Platform data team with domain ownership per product
      output:
        - Development objects
        - Published CADP tables/views
        - Access-controlled datasets

    Data_Product_Manager:
      purpose: Manage product metadata, agreements, and registration.
      used_for:
        - Requesting access to upstream SADPs.
        - Managing data agreements.
        - Registering CADP metadata.
        - Supporting publication workflow.
      owned_by: Data product governance / CADP owner
      output:
        - Approved data agreements
        - Registered CADP

    Data_Product_Portal:
      purpose: Discovery and access entry point for consumers.
      used_for:
        - Making published data products visible.
        - Allowing consumers to understand and request access.
        - Exposing product documentation and metadata.
      owned_by: Data platform / governance
      output:
        - Discoverable consumer-ready CADP

  end_to_end_tool_flow:
    - step: 1
      name: Purpose request
      primary_actor: Product Owner / Purpose Owner
      tools:
        - Purpose Request System
      outcome: Purpose submitted for governance review.

    - step: 2
      name: Governance review
      primary_actor: Architects / governance reviewers
      tools:
        - Purpose Request System
      outcome: Purpose approved, corrected, or rejected.

    - step: 3
      name: Platform provisioning
      primary_actor: Platform automation / platform team
      tools:
        - GitLab
        - Conveyor
        - Snowflake
      outcome: Repository, orchestration project, roles, and schemas are provisioned.

    - step: 4
      name: Developer setup
      primary_actor: CADP developer
      tools:
        - ONA
        - GitLab
      outcome: Developer can open the repository, connect, and start work.

    - step: 5
      name: Template initialization
      primary_actor: CADP developer
      tools:
        - CADP Template
        - DBT
        - Vulkan
      outcome: Standard CADP project structure exists.

    - step: 6
      name: Upstream access agreement
      primary_actor: CADP owner / Data Product Manager / SADP owner
      tools:
        - Data Product Manager
        - Snowflake
      outcome: Approved read access to required SADPs.

    - step: 7
      name: CADP modelling and development
      primary_actor: CADP developer
      tools:
        - ONA
        - DBT
        - Snowflake
      outcome: Staging, intermediate, fact, and dimension models are built and tested.

    - step: 8
      name: Commit and deploy
      primary_actor: CADP developer / CI/CD pipeline
      tools:
        - GitLab
        - Conveyor
        - Snowflake
      outcome: Pipeline deploys and executes CADP logic.

    - step: 9
      name: Register and publish
      primary_actor: CADP owner / Data Product Manager
      tools:
        - Data Product Manager
        - Data Product Portal
      outcome: CADP becomes discoverable and access-requestable.

  one_line_summary: >
    Purpose governs the initiative, GitLab stores the code, ONA is where developers build,
    DBT models the data, Vulkan configures execution, Conveyor runs pipelines, Snowflake stores
    outputs, and the Data Product Portal exposes the finished CADP to consumers.
